<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#ffffff"/>

  <!-- Periodic table mini-grid (18 cols representation simplified) -->
  <!-- Row 1 -->
  <rect x="32"  y="40"  width="52" height="52" rx="8" fill="#06b6d4"/>
  <rect x="428" y="40"  width="52" height="52" rx="8" fill="#ec4899"/>

  <!-- Row 2 -->
  <rect x="32"  y="102" width="52" height="52" rx="8" fill="#ef4444"/>
  <rect x="94"  y="102" width="52" height="52" rx="8" fill="#f97316"/>
  <rect x="272" y="102" width="52" height="52" rx="8" fill="#22c55e"/>
  <rect x="334" y="102" width="52" height="52" rx="8" fill="#06b6d4"/>
  <rect x="366" y="102" width="52" height="52" rx="8" fill="#8b5cf6"/>
  <rect x="428" y="102" width="52" height="52" rx="8" fill="#ec4899"/>

  <!-- Row 3 (transition metals) -->
  <rect x="32"  y="164" width="52" height="52" rx="8" fill="#ef4444"/>
  <rect x="94"  y="164" width="52" height="52" rx="8" fill="#f97316"/>
  <rect x="156" y="164" width="52" height="52" rx="8" fill="#eab308"/>
  <rect x="188" y="164" width="52" height="52" rx="8" fill="#eab308"/>
  <rect x="220" y="164" width="52" height="52" rx="8" fill="#eab308"/>
  <rect x="252" y="164" width="52" height="52" rx="8" fill="#eab308"/>
  <rect x="284" y="164" width="52" height="52" rx="8" fill="#84cc16"/>
  <rect x="316" y="164" width="52" height="52" rx="8" fill="#22c55e"/>
  <rect x="348" y="164" width="52" height="52" rx="8" fill="#06b6d4"/>
  <rect x="380" y="164" width="52" height="52" rx="8" fill="#8b5cf6"/>
  <rect x="428" y="164" width="52" height="52" rx="8" fill="#ec4899"/>

  <!-- Central atom symbol -->
  <!-- Atom nucleus -->
  <circle cx="256" cy="320" r="28" fill="#0284c7"/>
  <!-- Electron orbits -->
  <ellipse cx="256" cy="320" rx="90" ry="36" fill="none" stroke="#0284c7" stroke-width="5" opacity="0.7"/>
  <ellipse cx="256" cy="320" rx="90" ry="36" fill="none" stroke="#0284c7" stroke-width="5" opacity="0.7"
           transform="rotate(60 256 320)"/>
  <ellipse cx="256" cy="320" rx="90" ry="36" fill="none" stroke="#0284c7" stroke-width="5" opacity="0.7"
           transform="rotate(120 256 320)"/>

  <!-- "Pt" text in nucleus -->
  <text x="256" y="328" font-family="Arial Black, sans-serif" font-size="26" font-weight="900"
        fill="#ffffff" text-anchor="middle" dominant-baseline="middle">Pt</text>
</svg>
